version: '3.9'

services:

  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    command: >
      sh -c "python flarken/manage.py migrate &&
             python flarken/manage.py collectstatic --noinput &&
             gunicorn flarken.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    env_file: .env
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  bot:
    build: .
    restart: always
    command: python flarken/bot/bot.py
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - staticfiles:/staticfiles
      - /etc/letsencrypt:/etc/letsencrypt:ro  # якщо є SSL
    depends_on:
      - web

volumes:
  postgres_data:
  staticfiles: